name: refactor
version: 1.0
purpose: Improve code structure while preserving existing behavior and public contracts.

trigger:
  when:
    - user asks to refactor code
    - user asks to improve structure without changing behavior
    - user runs /autopilot refactor

context:
  source_of_truth:
    - AGENTS.md
    - docs/project-overview.md
    - docs/coding-standards.md
    - docs/current-feature.md

rules:
  - Do not change business behavior.
  - Do not change public API response shape unless explicitly requested.
  - Establish a passing baseline before refactoring when possible.
  - Add characterization tests first when important behavior lacks coverage.

skills:
  required:
    - autopilot
  conditional:
    - domain-driven-design
    - api-response

steps:
  - id: understand_current_behavior
    name: Understand Current Behavior
    instructions:
      - Read the target code and related tests.
      - Identify current behavior and public contracts.
      - Identify missing safety coverage.

  - id: baseline_tests
    name: Baseline Tests
    instructions:
      - Run relevant tests before editing when possible.
      - If tests are already failing, stop and report before refactoring.

  - id: plan_refactor
    name: Plan Refactor
    instructions:
      - Explain what will improve and why it is safe.
      - List files to change.
      - Keep the change small.
      - Ask for approval before broad refactors.

  - id: apply_refactor
    name: Apply Refactor
    instructions:
      - Refactor incrementally.
      - Avoid unrelated formatting churn.
      - Keep names and public contracts stable unless the request requires otherwise.

  - id: verify
    name: Verify
    instructions:
      - Run relevant tests after changes.
      - Confirm behavior change is none.

  - id: summarize
    name: Summarize
    format: |
      ## Summary
      ## Files Changed
      ## Tests
      ## Notes / Risks
      ## Next Step
