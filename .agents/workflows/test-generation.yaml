name: test-generation
version: 1.0
purpose: Add useful test coverage for existing behavior without changing production code unnecessarily.

trigger:
  when:
    - user asks to add tests
    - user asks to improve coverage
    - user runs /autopilot testgen

context:
  source_of_truth:
    - AGENTS.md
    - docs/project-overview.md
    - docs/coding-standards.md
    - docs/current-feature.md

skills:
  required:
    - autopilot
  conditional:
    - domain-driven-design
    - api-response

steps:
  - id: inspect_behavior
    name: Inspect Behavior
    instructions:
      - Read the target production code and existing tests.
      - Identify inputs, outputs, side effects, and expected behavior.
      - Avoid testing implementation details.

  - id: identify_test_cases
    name: Identify Test Cases
    instructions:
      - List success cases.
      - List failure cases.
      - List edge cases.
      - Prioritize behavior that carries business or regression risk.

  - id: write_tests
    name: Write Tests
    instructions:
      - Follow project testing conventions.
      - Use clear behavior-oriented test names.
      - Avoid over-mocking.
      - Change production code only when required to make behavior testable, and explain why.

  - id: run_tests
    name: Run Tests
    instructions:
      - Run new tests first.
      - Fix test issues up to 3 attempts.
      - Run related or full suite when reasonable.

  - id: summarize
    name: Summarize
    format: |
      ## Summary
      ## Files Changed
      ## Tests
      ## Notes / Risks
      ## Next Step
